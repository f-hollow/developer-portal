name: Suggest tags

on:
  workflow_run:
    workflows:
      - "Trigger tag suggestions"
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  tag-suggestions:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Download PR metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-tag-suggestions-metadata
          path: ./
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PR metadata from files
        run: |
          PR_NUMBER="$(cat pr_num.txt)"
          PR_REF="$(cat pr_head_ref.txt)"
          PR_SHA="$(cat pr_head_sha.txt)"
          PR_LABEL="$(cat pr_label.txt)"

          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"
          echo "PR_REF=$PR_REF" >> "$GITHUB_ENV"
          echo "PR_SHA=$PR_SHA" >> "$GITHUB_ENV"
          echo "PR_LABEL=$PR_LABEL" >> "$GITHUB_ENV"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PR_SHA }}
          fetch-depth: 0

      - name: Prepare tagging prompt
        id: prepare
        run: |
          bash tools/ci/tag-suggestions/prepare_tagging_prompt.sh

      - name: Get tag suggestions
        id: suggest
        if: success()
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          bash tools/ci/tag-suggestions/get_tag_suggestions.sh

      - name: Post tag suggestions comment to PR
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const commentPath = 'tools/ci/tag-suggestions/temp/comment_body.txt';
            if (!fs.existsSync(commentPath)) {
              core.setFailed('Comment body file not found: ' + commentPath);
              return;
            }
            const commentBody = fs.readFileSync(commentPath, 'utf8');
            const prNumber = process.env.PR_NUMBER;

            try {
              const { data: comments } = await github.rest.issues.listComments({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo
              });

              const marker = 'Suggested tags for new article(s) in this PR:';
              const existingComment = comments.find(comment =>
                comment.user.type === 'Bot' && comment.body.includes(marker)
              );

              if (existingComment) {
                await github.rest.issues.deleteComment({
                  comment_id: existingComment.id,
                  owner: context.repo.owner,
                  repo: context.repo.repo
                });
              }

              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: marker + '\n\n' + commentBody
              });
            } catch (error) {
              core.setFailed('Failed to manage PR comment: ' + error.message);
            }

      - name: Remove label
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = process.env.PR_NUMBER;
            const label = process.env.PR_LABEL;

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              name: label
            });
