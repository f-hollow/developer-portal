name: Trigger tag suggestions

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read

jobs:
  trigger-tag-suggestions:
    if: github.event.label.name == 'suggest-tags'
    runs-on: ubuntu-latest

    steps:
      - name: Collect PR metadata
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_LABEL: ${{ github.event.label.name }}
        run: |
          printf '%s\n' "$PR_NUM" > pr_num.txt
          printf '%s\n' "$PR_URL" > pr_url.txt
          printf '%s\n' "$PR_HEAD_REF" > pr_head_ref.txt
          printf '%s\n' "$PR_HEAD_SHA" > pr_head_sha.txt
          printf '%s\n' "$PR_LABEL" > pr_label.txt

      - name: Upload PR metadata
        uses: actions/upload-artifact@v4
        with:
          name: pr-tag-suggestions-metadata
          path: |
            pr_num.txt
            pr_url.txt
            pr_head_ref.txt
            pr_head_sha.txt
            pr_label.txt
