name: Check article details

on:
  pull_request:
    branches:
      - main
    paths:
      - 'content/blog/**'

env:
  TARGET_REPO_URL: "https://github.com/espressif/developer-portal.git"
  TARGET_BRANCH: "main"

jobs:
  check-article-details:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR contents
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get added folders and files
        id: added-files
        run: |
          # Add target remote and fetch its branches
          git remote add target "$TARGET_REPO_URL"
          git fetch target "$TARGET_BRANCH"

          mkdir -p temp

          git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD > temp/added-files.txt

          echo "List of added files:"
          cat temp/added-files.txt

          while IFS= read -r line; do
            if [[ "$line" =~ ^content/blog/.*/index.md$ ]]; then
              echo "$line" >> temp/index-files.txt
            fi
          done < temp/added-files.txt

          echo "List of added index files:"
          cat temp/index-files.txt

      - name: Extract Article Details and Write to File
        run: |
          #!/bin/bash
          set -e

          while IFS= read -r index_file; do
            ARTICLE_ID=$(dirname "$index_file" | sed 's|content/blog/||' | sed 's|/index.md||')

            FOLDER_MM=""
            FOLDER_YYYY=""
            if [[ "$ARTICLE_ID" =~ ^([0-9]{4})/([0-9]{2})/ ]]; then
              FOLDER_MM="${BASH_REMATCH[2]}"
              FOLDER_YYYY="${BASH_REMATCH[1]}"
            fi

            ARTICLE_DATE=$(awk '/^date: "[0-9]{4}-[0-9]{2}-[0-9]{2}"/ {gsub(/^date: "|"/, ""); print $0}' "$index_file")
            ARTICLE_YEAR=$(echo "$ARTICLE_DATE" | cut -d'-' -f1)
            ARTICLE_MONTH=$(echo "$ARTICLE_DATE" | cut -d'-' -f2)

            if [ -n "$ARTICLE_DATE" ]; then
              cat <<EOF >> "temp/extracted_article_data.yaml"
- article_id: "$ARTICLE_ID"
  folder_mm: "$FOLDER_MM"
  folder_yyyy: "$FOLDER_YYYY"
  article_date: "$ARTICLE_DATE"
  article_year: "$ARTICLE_YEAR"
  article_month: "$ARTICLE_MONTH"
EOF
            else
              echo "Warning: Could not extract 'date' from YAML header in $index_file. Skipping."
            fi
          done < temp/index-files.txt

          echo "Extracted article data:"
          cat temp/extracted_article_data.yaml

