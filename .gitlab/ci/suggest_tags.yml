stages:
  - suggest_tags
  - suggest_tags_cleanup

variables:
  GIT_DEPTH: "0"

suggest_tags_job:
  stage: suggest_tags
  image: ubuntu:latest
  rules:
    - when: always
  tags:
    - deploy_docs
    - shiny
  variables:
    PROJECT_ID: "$CI_PROJECT_ID"
    MR_ID: "$CI_MERGE_REQUEST_IID"
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl jq python3
  script:
    - bash tools/ci/tag-suggestions/prepare_tagging_prompt.sh
    - bash tools/ci/tag-suggestions/get_tag_suggestions.sh
    - |
      COMMENT_FILE="tools/ci/tag-suggestions/temp/comment_body.txt"
      if [ ! -f "$COMMENT_FILE" ]; then
        echo "Comment body file not found: $COMMENT_FILE"
        exit 1
      fi
      MARKER="Suggested tags for new article(s) in this PR:"
      COMMENT_BODY="${MARKER}

      $(cat "$COMMENT_FILE")"
      GITLAB_API="https://${CI_SERVER_HOST}:${CI_SERVER_PORT}/api/v4/projects/${PROJECT_ID}/merge_requests/${MR_ID}/notes"
      AUTH_HEADER="PRIVATE-TOKEN: ${GITLAB_BOT_API_TOKEN}"

      EXISTING=$(curl --silent --header "$AUTH_HEADER" "$GITLAB_API" | jq -r --arg m "$MARKER" '.[] | select(.body | contains($m)) | .id')
      if [ -n "$EXISTING" ]; then
        for ID in $EXISTING; do
          curl --silent --request DELETE --header "$AUTH_HEADER" "${GITLAB_API}/${ID}"
        done
      fi
      BODY_JSON=$(echo "$COMMENT_BODY" | jq -Rs .)
      curl --silent --request POST \
        --header "$AUTH_HEADER" \
        --header "Content-Type: application/json" \
        --data "{\"body\": $BODY_JSON}" \
        "$GITLAB_API"

remove_suggest_tags_label:
  stage: suggest_tags_cleanup
  image: badouralix/curl-jq
  rules:
    - when: always
  tags:
    - deploy_docs
    - shiny
  needs:
    - suggest_tags_job
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl jq
  script:
    - |
      MR=$(curl --silent --header "PRIVATE-TOKEN: ${GITLAB_BOT_API_TOKEN}" \
        "https://${CI_SERVER_HOST}:${CI_SERVER_PORT}/api/v4/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}")
      LABELS=$(echo "$MR" | jq -r '.labels[]' | grep -v '^Suggest-Tags$' | paste -sd ',' - || true)
      curl --silent --request PUT \
        --header "PRIVATE-TOKEN: ${GITLAB_BOT_API_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"labels\": \"$LABELS\"}" \
        "https://${CI_SERVER_HOST}:${CI_SERVER_PORT}/api/v4/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}"
